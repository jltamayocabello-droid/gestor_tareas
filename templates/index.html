<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Tareas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <main>
        <h1>Gestor de Tareas</h1>

        <form class="form-agregar" action="{{ url_for('agregar') }}" method="post">
            <input type="text" name="texto" placeholder="Nueva tarea" required>
            <button type="submit">Agregar</button>
        </form>

        <ul class="lista-tareas">
            {% for tarea in tareas %}
            <li class="{% if tarea.completada %}completada{% endif %}">
                <span>#{{ tarea.id }} — {{ tarea.texto }}</span>
                {% if not tarea.completada %}
                <form action="{{ url_for('completar', id=tarea.id) }}" method="post">
                    <button type="submit">Completar</button>
                </form>
                {% endif %}
            </li>
            {% else %}
            <li class="vacio">No hay tareas.</li>
            {% endfor %}
        </ul>
    </main>
</body>
</html>
